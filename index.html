<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  :root {
    --bg: #1A1F16; --card: #242B1E; --card-hover: #2C3524;
    --accent: #8DB654; --accent-dim: rgba(141,182,84,0.15);
    --text: #E8E4DC; --text-dim: #9C9786; --warm: #D4A053;
    --danger: #C45B4A; --border: rgba(141,182,84,0.12);
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; }
  body { display: flex; flex-direction: column; }
  #app { display: flex; flex-direction: column; flex: 1; height: 100%; overflow: hidden; }
  ::-webkit-scrollbar { display: none; }
  input, textarea, button { font-family: inherit; }
  
  @keyframes fadeSlideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  @keyframes slideDown { from { transform:translateY(-100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); }
  .card:active { background: var(--card-hover); }
  .pill { padding: 6px 14px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
  .pill-active { background: var(--accent); color: var(--bg); }
  .pill-inactive { background: var(--card); color: var(--text-dim); }
  .section-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  
  .btn-add { width: 44px; height: 44px; border-radius: 14px; border: none; background: var(--accent); color: var(--bg);
    font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(141,182,84,0.3); transition: transform 0.2s; font-weight: 300; }
  .btn-add:active { transform: scale(0.94); }

  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around;
    padding: 10px 40px calc(12px + var(--safe-bottom));
    background: linear-gradient(transparent, var(--bg) 25%); z-index: 10; }
  .tab-btn { background: none; border: none; cursor: pointer; padding: 8px 24px; display: flex;
    flex-direction: column; align-items: center; gap: 4px; transition: opacity 0.2s; }
  .tab-btn.active { opacity: 1; }
  .tab-btn.inactive { opacity: 0.35; }

  .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 20;
    display: flex; flex-direction: column; animation: slideUp 0.35s cubic-bezier(0.32,0.72,0,1); }
  .overlay-header { padding: calc(var(--safe-top) + 12px) 20px 14px; display: flex;
    justify-content: space-between; align-items: center; }
  .overlay-scroll { flex: 1; overflow-y: auto; padding: 0 20px 40px; -webkit-overflow-scrolling: touch; }

  .sighting-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; }
  .animal-icon { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center;
    justify-content: center; font-size: 22px; position: relative; flex-shrink: 0; }
  .video-badge { position: absolute; bottom: -3px; right: -3px; width: 20px; height: 20px; border-radius: 6px;
    background: var(--text); display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
  .behavior-tag { font-size: 10px; padding: 3px 8px; border-radius: 8px;
    background: var(--accent-dim); color: var(--accent); font-weight: 600; }

  .video-player { border-radius: 20px; overflow: hidden; margin-bottom: 16px; background: #0D0F0A;
    border: 1px solid var(--border); }
  .video-canvas { width: 100%; aspect-ratio: 16/9; cursor: pointer;
    background: linear-gradient(135deg, #1a2210, #2a3820, #1a2210);
    display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .play-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3); transition: transform 0.2s; }
  .play-circle:active { transform: scale(0.9); }

  .upload-zone { width: 100%; padding: 24px 16px; border-radius: 16px; border: 2px dashed var(--border);
    background: transparent; color: var(--text-dim); font-size: 13px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 8px; transition: border-color 0.2s; }
  .upload-zone:active { border-color: var(--accent); color: var(--accent); }

  .select-check { width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--border);
    background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; cursor: pointer; }
  .select-check.checked { background: var(--accent); border-color: var(--accent); }
  .select-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
    padding: 14px 20px calc(14px + var(--safe-bottom)); background: var(--card);
    border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center;
    animation: slideUp 0.25s ease; }
  .select-bar-btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: transform 0.15s; }
  .select-bar-btn:active { transform: scale(0.96); }

  .toast { position: fixed; top: calc(var(--safe-top) + 10px); left: 50%; transform: translateX(-50%);
    background: var(--accent); color: var(--bg); padding: 10px 20px; border-radius: 12px;
    font-size: 13px; font-weight: 600; z-index: 50; animation: slideDown 0.3s ease, fadeSlideUp 0.3s 2s reverse forwards;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

  .progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(0.34,1.56,0.64,1); }

  .quantity-btn { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; }
  .quantity-btn:active { background: var(--card-hover); }
</style>

<script>

const DEFAULT_ANIMALS = [

  { id:26, name:"Salamander", cat:"Amphibian", emoji:"🦎", color:"#FF6347" },
  { id:27, name:"Snapping Turtle", cat:"Reptile", emoji:"🐢", color:"#556B2F" },

  { id:30, name:"Praying Mantis", cat:"Insect", emoji:"🦗", color:"#6B8E23" },

let ANIMALS = [...DEFAULT_ANIMALS];
const CATEGORIES = ["All","Bird","Mammal","Reptile","Amphibian","Insect"];
const CUSTOM_ANIMAL_STORE = "customAnimals";
const ANIMAL_EMOJIS = ["🐦","🦅","🦉","🦆","🪿","🦃","🪶","🐧","🦜","🦢","🦌","🦊","🐺","🐇","🐿️","🦝","🦨","🦇","🦫","🐾","🐢","🐍","🦎","🐊","🐸","🦋","🐝","🐞","🦗","🪰","✨","🕷️","🐛","🦂","🐠","🐟","🦈","🐋","🐬","🦭"];
const ANIMAL_COLORS = ["#4A90D9","#C41E3A","#D4652F","#5A8C3C","#8B6914","#7A6B5D","#A0826D","#6B3A2A","#5C7A29","#4A4A4A","#5B7FA5","#3D6B35","#E8860C","#8C8C8C","#B5651D","#D2691E","#B22222","#FFD700","#4682B4","#2E8B57"];
const WEATHER = ["☀️ Sunny","⛅ Partly Cloudy","☁️ Overcast","🌧️ Rainy","❄️ Snowy","🌫️ Foggy"];
const BEHAVIORS = ["Feeding","Resting","Moving","Nesting","Playing","Hunting","Drinking","Calling"];

const SEED = [
  { id:1, animalId:6, date:"2026-03-18T07:30:00", weather:"☀️ Sunny", behavior:"Feeding", notes:"Pair at the bird feeder this morning", qty:2, video:null },
  { id:2, animalId:5, date:"2026-03-17T15:45:00", weather:"⛅ Partly Cloudy", behavior:"Playing", notes:"Chasing each other up the oak tree", qty:3, video:null },
  { id:3, animalId:7, date:"2026-03-16T18:20:00", weather:"☁️ Overcast", behavior:"Feeding", notes:"Nibbling clover near the garden bed", qty:1, video:null },
];

// ==================== PERSISTENCE (IndexedDB) ====================
const DB_NAME = "BackyardWildDB";
const STORE = "sightings";
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "id" });
      if (!db.objectStoreNames.contains(CUSTOM_ANIMAL_STORE)) db.createObjectStore(CUSTOM_ANIMAL_STORE, { keyPath: "id" });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
async function loadCustomAnimals() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(CUSTOM_ANIMAL_STORE, "readonly");
      const store = tx.objectStore(CUSTOM_ANIMAL_STORE);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
  } catch { return []; }
}
async function saveCustomAnimals(customs) {
  try {
    const db = await openDB();
    const tx = db.transaction(CUSTOM_ANIMAL_STORE, "readwrite");
    const store = tx.objectStore(CUSTOM_ANIMAL_STORE);
    store.clear();
    customs.forEach(a => store.put(a));
  } catch (e) { console.warn("Save custom animals failed:", e); }
}
async function loadSightings() {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, "readonly");
      const store = tx.objectStore(STORE);
      const req = store.getAll();
      req.onsuccess = () => {
        const results = req.result;
        if (!results || results.length === 0) return resolve(null);
        // Recreate objectUrls from stored blobs
        results.forEach(s => {
          if (s.video && s.video.blob) {
            s.video.objectUrl = URL.createObjectURL(s.video.blob);
          }
        });
        resolve(results.sort((a,b) => new Date(b.date) - new Date(a.date)));
      };
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}
async function saveSightings(sightings) {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE, "readwrite");
    const store = tx.objectStore(STORE);
    store.clear();
    sightings.forEach(s => {
      const clean = { ...s };
      if (clean.video) {
        clean.video = { ...clean.video };
        // Keep the blob for persistence, but remove the ephemeral objectUrl
        if (clean.video.blob) { clean.video.blob = clean.video.blob; }
        delete clean.video.objectUrl;
      }
      store.put(clean);
    });
  } catch (e) { console.warn("Save failed:", e); }
}

// ==================== STATE ====================
let state = {
  sightings: SEED,
  tab: "feed",
  overlay: null, // null | "new" | sighting object
  search: "",
  filterCat: "All",
  newForm: { animalId:null, weather:WEATHER[0], behavior:BEHAVIORS[0], notes:"", qty:1, video:null },
  videoPlaying: false,
  toast: null,
  editId: null,
  selectMode: false,
  selected: new Set(),
  showCustomAnimalForm: false,
  customAnimalForm: { name:"", cat:"Bird", emoji:"🐦", color:"#4A90D9" },
  customAnimals: [],
};

function getAnimal(id) { return ANIMALS.find(a => a.id === id); }
function getAllAnimals() { return ANIMALS; }

function fmtDate(d) {
  const now = new Date(), dt = new Date(d), diff = Math.floor((now-dt)/864e5);
  if (diff === 0) return "Today";
  if (diff === 1) return "Yesterday";
  if (diff < 7) return diff + " days ago";
  return dt.toLocaleDateString("en-US", { month:"short", day:"numeric" });
}
function fmtTime(d) { return new Date(d).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" }); }
function fmtLongDate(d) { return new Date(d).toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" }); }
function todayStr() { return new Date().toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" }); }

// ==================== RENDER ENGINE ====================
function render() {
  const app = document.getElementById("app");
  let html = "";

  // Header
  html += `<div style="padding:calc(var(--safe-top) + 8px) 20px 14px; display:flex; justify-content:space-between; align-items:center;">
    <div>
      <div style="font-size:26px; font-weight:800; letter-spacing:-0.5px;">Backyard<span style="color:var(--accent)">Wild</span></div>
      <div style="font-size:12px; color:var(--text-dim); margin-top:2px;">${todayStr()}</div>
    </div>
    <button class="btn-add" onclick="openNew()">+</button>
  </div>`;

  // Content
  if (state.tab === "feed") html += renderFeed();
  else html += renderStats();

  // Tab bar
  html += `<div class="tab-bar">
    ${["feed","stats"].map(t => `
      <button class="tab-btn ${state.tab===t?"active":"inactive"}" onclick="switchTab('${t}')">
        <span style="font-size:20px">${t==="feed"?"🏠":"📊"}</span>
        <span style="font-size:10px; font-weight:600; color:var(--text)">${t==="feed"?"Feed":"Stats"}</span>
      </button>`).join("")}
  </div>`;

  // Overlays
  if (state.overlay === "new") html += renderNewSighting();
  else if (state.overlay && typeof state.overlay === "object") html += renderDetail(state.overlay);

  // Select mode action bar
  if (state.selectMode && state.selected.size > 0) {
    html += `<div class="select-bar">
      <button class="select-bar-btn" onclick="selectAll()" style="background:var(--accent-dim); color:var(--accent);">Select All</button>
      <button class="select-bar-btn" onclick="deleteSelected()" style="background:var(--danger); color:#fff;">Delete (${state.selected.size})</button>
    </div>`;
  }

  // Toast
  if (state.toast) html += `<div class="toast">${state.toast}</div>`;

  app.innerHTML = html;
}

// ==================== FEED TAB ====================
function renderFeed() {
  const s = state.sightings;
  const last7 = Array.from({length:7},(_,i) => { const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().split("T")[0]; });
  const daily = last7.map(day => s.filter(x => x.date.startsWith(day)).length);
  const maxD = Math.max(...daily, 1);
  const species = [...new Set(s.map(x => x.animalId))];
  const totalAnimals = s.reduce((sum,x) => sum + x.qty, 0);
  const weekTotal = daily.reduce((a,b) => a+b, 0);
  const dayLabels = last7.map(d => ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(d).getDay()][0]);

  let h = `<div style="flex:1; overflow-y:auto; padding:0 20px calc(90px + var(--safe-bottom)); -webkit-overflow-scrolling:touch;">`;

  // Stats strip
  h += `<div style="display:flex; gap:12px; margin-bottom:20px; padding:14px 0;">`;
  [{l:"This Week",v:weekTotal,s:"sightings"},{l:"Species",v:species.length,s:"spotted"},{l:"Total",v:totalAnimals,s:"animals"}].forEach((st,i) => {
    h += `<div class="card" style="flex:1; padding:14px 12px; animation:fadeSlideUp 0.5s ${i*80}ms both;">
      <div style="font-size:11px; color:var(--text-dim); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:4px;">${st.l}</div>
      <div style="font-size:26px; font-weight:700; color:var(--accent); line-height:1;">${st.v}</div>
      <div style="font-size:11px; color:var(--text-dim); margin-top:2px;">${st.s}</div>
    </div>`;
  });
  h += `</div>`;

  // Weekly chart
  h += `<div class="card" style="padding:18px; margin-bottom:20px; border-radius:20px; animation:fadeSlideUp 0.5s 240ms both;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span style="font-size:13px; font-weight:600;">Last 7 Days</span>
      <span style="font-size:11px; color:var(--text-dim);">Daily sightings</span>
    </div>
    <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:6px; height:56px;">
      ${daily.map((v,i) => `<div style="display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;">
        <div style="width:100%; max-width:32px; border-radius:8px; height:${Math.max(6,(v/maxD)*48)}px;
          background:${i===6?"var(--accent)":"rgba(141,182,84,0.3)"}; transition:height 0.8s cubic-bezier(0.34,1.56,0.64,1);"></div>
        <span style="font-size:9px; color:var(--text-dim);">${dayLabels[i]}</span>
      </div>`).join("")}
    </div>
  </div>`;

  // Recent sightings
  h += `<div style="margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
    <span style="font-size:15px; font-weight:700;">Recent Sightings</span>
    <div style="display:flex; align-items:center; gap:10px;">
      ${state.selectMode ? `<span style="font-size:12px; color:var(--accent); font-weight:600;">${state.selected.size} selected</span>` : `<span style="font-size:12px; color:var(--text-dim);">${s.length} total</span>`}
      ${s.length > 0 ? `<button onclick="toggleSelectMode()" style="background:${state.selectMode ? 'var(--card-hover)' : 'var(--card)'}; border:1px solid var(--border); color:var(--text); padding:5px 12px; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer;">${state.selectMode ? 'Cancel' : 'Select'}</button>` : ''}
    </div>
  </div>`;

  s.slice(0, 20).forEach((sg, i) => {
    const a = getAnimal(sg.animalId);
    if (!a) return;
    const isSel = state.selected.has(sg.id);
    const clickAction = state.selectMode ? `toggleSelect(${sg.id})` : `openDetail(${sg.id})`;
    h += `<div class="card sighting-row" onclick="${clickAction}" style="margin-bottom:8px; animation:fadeSlideUp 0.4s ${320+i*50}ms both; ${isSel ? 'border-color:var(--accent); background:rgba(141,182,84,0.08);' : ''}">
      ${state.selectMode ? `<div class="select-check ${isSel?'checked':''}">
        ${isSel ? '<svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 7l3 3 5-6" stroke="#1A1F16" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
      </div>` : ''}
      <div class="animal-icon" style="background:${a.color}22;">
        ${a.emoji}
        ${sg.video ? `<div class="video-badge"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 1.5v7l6.5-3.5L2 1.5z" fill="#1A1F16"/></svg></div>` : ""}
      </div>
      <div style="flex:1; min-width:0;">
        <div style="font-size:14px; font-weight:600;">${a.name}</div>
        <div style="font-size:12px; color:var(--text-dim); margin-top:2px; display:flex; gap:8px;">
          <span>${fmtDate(sg.date)} · ${fmtTime(sg.date)}</span>
          ${sg.qty > 1 ? `<span style="color:var(--accent)">×${sg.qty}</span>` : ""}
        </div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
        <span class="behavior-tag">${sg.behavior}</span>
        <span style="font-size:16px;">${sg.weather.split(" ")[0]}</span>
      </div>
    </div>`;
  });

  h += `</div>`;
  return h;
}

// ==================== STATS TAB ====================
function renderStats() {
  const s = state.sightings;
  const specStats = getAllAnimals().map(a => ({
    ...a, count: s.filter(x=>x.animalId===a.id).length,
    lastSeen: s.filter(x=>x.animalId===a.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]?.date
  })).filter(a=>a.count>0).sort((a,b)=>b.count-a.count);

  const catColors = { Bird:"#4A90D9", Mammal:"#D4A053", Reptile:"#5A8C3C", Amphibian:"#5C7A29", Insect:"#E8860C" };
  const catBreak = CATEGORIES.slice(1).map(c => ({
    name:c, count:s.filter(x=>getAnimal(x.animalId)?.cat===c).length
  })).filter(c=>c.count>0);

  let h = `<div style="flex:1; overflow-y:auto; padding:0 20px calc(90px + var(--safe-bottom)); -webkit-overflow-scrolling:touch;">`;

  // Category breakdown
  h += `<div class="card" style="border-radius:20px; padding:18px; margin-bottom:16px;">
    <div style="font-size:13px; font-weight:600; margin-bottom:14px;">By Category</div>`;
  catBreak.forEach((cat,i) => {
    const pct = (cat.count / s.length) * 100;
    h += `<div style="margin-bottom:12px; animation:fadeSlideUp 0.5s ${i*80}ms both;">
      <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
        <span style="font-size:13px;">${cat.name}s</span>
        <span style="font-size:12px; color:var(--text-dim);">${cat.count} (${Math.round(pct)}%)</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%; background:${catColors[cat.name]||"var(--accent)"};"></div></div>
    </div>`;
  });
  h += `</div>`;

  // Species leaderboard
  h += `<div style="font-size:15px; font-weight:700; margin-bottom:12px;">Species Leaderboard</div>`;
  specStats.forEach((sp,i) => {
    const rankBg = i===0?"rgba(212,160,83,0.2)":i===1?"rgba(192,192,192,0.15)":i===2?"rgba(180,120,60,0.15)":"rgba(255,255,255,0.05)";
    const rankCol = i===0?"#D4A053":i===1?"#C0C0C0":i===2?"#B4783C":"var(--text-dim)";
    h += `<div class="card" style="display:flex; align-items:center; gap:14px; padding:12px 16px; margin-bottom:8px; animation:fadeSlideUp 0.5s ${i*60}ms both;">
      <div style="width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center;
        background:${rankBg}; font-size:13px; font-weight:800; color:${rankCol};">${i+1}</div>
      <span style="font-size:20px;">${sp.emoji}</span>
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:600;">${sp.name}</div>
        <div style="font-size:11px; color:var(--text-dim);">${sp.lastSeen ? "Last: " + fmtDate(sp.lastSeen) : ""}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:18px; font-weight:700; color:var(--accent);">${sp.count}</div>
        <div style="font-size:10px; color:var(--text-dim);">sightings</div>
      </div>
    </div>`;
  });

  // Highlights
  h += `<div class="card" style="border-radius:20px; padding:18px; margin-top:16px; background:linear-gradient(135deg,var(--card),rgba(141,182,84,0.08));">
    <div style="font-size:13px; font-weight:600; margin-bottom:10px;">🌿 Yard Highlights</div>
    <div style="font-size:12px; color:var(--text-dim); line-height:1.6;">
      You've logged <span style="color:var(--accent); font-weight:600;">${s.length} sightings</span> of
      <span style="color:var(--accent); font-weight:600;">${specStats.length} species</span>.
      ${specStats[0] ? `Your most frequent visitor is the <span style="color:var(--warm); font-weight:600;">${specStats[0].name}</span>.` : ""}
    </div>
  </div>`;

  h += `</div>`;
  return h;
}

// ==================== NEW SIGHTING OVERLAY ====================

        <button onclick="state.showCustomAnimalForm=false; render();"

        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          ${CATEGORIES.slice(1).map(c => `<button class="pill ${cf.cat===c?"pill-active":"pill-inactive"}"

              border:${cf.emoji===e?'2px solid var(--accent)':'1px solid var(--border)'};

        </div>
      </div>
      <div style="margin-bottom:14px;">
        <div style="font-size:11px; color:var(--text-dim); margin-bottom:6px;">Color</div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          ${ANIMAL_COLORS.map(c => `<button onclick="state.customAnimalForm.color='${c}'; render();"

// ==================== DETAIL VIEW ====================
function renderDetail(s) {
  const a = getAnimal(s.animalId);
  if (!a) return "";
  const allForSpecies = state.sightings.filter(x => x.animalId === s.animalId);

  let h = `<div class="overlay">
    <div class="overlay-header" style="justify-content:flex-start;">
      <button onclick="closeOverlay()" style="background:none; border:none; color:var(--accent); font-size:15px; cursor:pointer;">← Back</button>
    </div>

  // Hero
  h += `<div style="text-align:center; padding:30px 0 24px;">
    <div style="width:90px; height:90px; border-radius:28px; margin:0 auto 16px;
      background:${a.color}25; display:flex; align-items:center; justify-content:center;
      font-size:44px; box-shadow:0 8px 32px ${a.color}20;">${a.emoji}</div>

  // Video player
  if (s.video) {
    if (s.video.objectUrl) {
      h += `<div class="video-player">

      h += `<div class="video-player">
        <div class="video-canvas">
          <div style="position:absolute; inset:0; opacity:0.05;
            background-image:radial-gradient(circle at 20% 30%, rgba(141,182,84,0.3) 0%, transparent 50%),

            </svg>
            <div style="font-size:11px; color:var(--text-dim);">Video recorded · no file available</div>
          </div>
          <div style="position:absolute; bottom:8px; right:10px; font-size:11px; color:#fff; font-weight:700;
            z-index:2; background:rgba(0,0,0,0.6); padding:3px 8px; border-radius:6px;">${s.video.dur}</div>
        </div>
        <div style="padding:10px 14px; display:flex; align-items:center; gap:10px; background:var(--card);">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="10" height="8" rx="2" stroke="var(--accent)" stroke-width="1.3"/>
            <path d="M11 6l3.5-2v6L11 8V6z" stroke="var(--accent)" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          <span style="font-size:12px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${s.video.name}</span>

    </div>`;

  h += `</div>`;

    <button onclick="editSighting(${s.id})" style="flex:1; padding:14px; border-radius:14px; border:1px solid var(--border);

    </button>
    <button onclick="deleteSighting(${s.id})" style="flex:1; padding:14px; border-radius:14px; border:1px solid rgba(196,91,74,0.3);
      background:rgba(196,91,74,0.1); color:var(--danger); font-size:14px; font-weight:600; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Delete
    </button>
  </div>`;

  h += `</div></div>`;
  return h;
}

// ==================== ACTIONS ====================
function switchTab(t) { state.tab = t; state.selectMode = false; state.selected = new Set(); render(); }

function openNew() {
  state.overlay = "new"; state.search = ""; state.filterCat = "All"; state.editId = null;
  state.newForm = { animalId:null, weather:WEATHER[0], behavior:BEHAVIORS[0], notes:"", qty:1, video:null };
  render();
}
function closeOverlay() { state.overlay = null; state.videoPlaying = false; state.editId = null; render(); }

function openDetail(id) {
  const sg = state.sightings.find(s => s.id === id);
  if (sg) { state.overlay = sg; state.videoPlaying = false; render(); }
}

function saveSighting() {
  const f = state.newForm;
  if (!f.animalId) return;
  if (state.editId) {
    const idx = state.sightings.findIndex(s => s.id === state.editId);
    if (idx !== -1) {
      state.sightings[idx] = {
        ...state.sightings[idx], animalId: f.animalId,
        weather: f.weather, behavior: f.behavior, notes: f.notes, qty: f.qty,
        video: f.video ? { name:f.video.name, size:f.video.size, dur:f.video.dur, objectUrl:f.video.objectUrl||null, blob:f.video.blob||null } : null
      };
    }
    state.editId = null;
    state.overlay = null;
    state.tab = "feed";
    showToast("Sighting updated!");
  } else {
    const sg = {
      id: Date.now(), animalId: f.animalId, date: new Date().toISOString(),
      weather: f.weather, behavior: f.behavior, notes: f.notes, qty: f.qty,
      video: f.video ? { name:f.video.name, size:f.video.size, dur:f.video.dur, objectUrl:f.video.objectUrl||null, blob:f.video.blob||null } : null
    };
    state.sightings.unshift(sg);
    state.overlay = null;
    state.tab = "feed";
    showToast("Sighting saved!");
  }
  saveSightings(state.sightings);
  render();
}

function handleVideoFile(input) {
  const file = input.files?.[0];
  if (!file) return;
  const sizeMB = (file.size / (1024*1024)).toFixed(1);
  const objectUrl = URL.createObjectURL(file);
  const tempVideo = document.createElement("video");
  tempVideo.preload = "metadata";
  tempVideo.onloadedmetadata = () => {
    const secs = Math.floor(tempVideo.duration);
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    state.newForm.video = { name: file.name, size: sizeMB+" MB", dur: m+":"+(s<10?"0":"")+s, objectUrl, blob: file };
    render();
  };
  tempVideo.onerror = () => {
    state.newForm.video = { name: file.name, size: sizeMB+" MB", dur: "0:00", objectUrl, blob: file };
    render();
  };
  tempVideo.src = objectUrl;
}

function deleteSighting(id) {
  if (!confirm("Delete this sighting?")) return;
  state.sightings = state.sightings.filter(s => s.id !== id);
  state.overlay = null;
  showToast("Sighting deleted");
  saveSightings(state.sightings);
  render();
}

function editSighting(id) {
  const sg = state.sightings.find(s => s.id === id);
  if (!sg) return;
  state.editId = id;
  state.newForm = {
    animalId: sg.animalId, weather: sg.weather, behavior: sg.behavior,
    notes: sg.notes, qty: sg.qty, video: sg.video ? { ...sg.video } : null
  };
  state.overlay = "new";
  state.search = "";
  state.filterCat = "All";
  render();
}

function showToast(msg) {
  state.toast = msg; render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

// ==================== CUSTOM ANIMALS ====================
function saveCustomAnimal() {
  const cf = state.customAnimalForm;
  if (!cf.name.trim()) return;
  const newId = Date.now();
  const animal = { id: newId, name: cf.name.trim(), cat: cf.cat, emoji: cf.emoji, color: cf.color, custom: true };
  ANIMALS.push(animal);
  state.customAnimals.push(animal);
  saveCustomAnimals(state.customAnimals);
  state.newForm.animalId = newId;
  state.showCustomAnimalForm = false;
  state.customAnimalForm = { name:"", cat:"Bird", emoji:"🐦", color:"#4A90D9" };
  showToast(`${animal.name} added!`);
  render();
}

// ==================== BATCH SELECT ====================
function toggleSelectMode() {
  state.selectMode = !state.selectMode;
  state.selected = new Set();
  render();
}
function toggleSelect(id) {
  if (state.selected.has(id)) state.selected.delete(id);
  else state.selected.add(id);
  render();
}
function selectAll() {
  const visible = state.sightings.slice(0, 20);
  if (state.selected.size === visible.length) {
    state.selected = new Set();
  } else {
    state.selected = new Set(visible.map(s => s.id));
  }
  render();
}
function deleteSelected() {
  const count = state.selected.size;
  if (!confirm(`Delete ${count} sighting${count > 1 ? 's' : ''}?`)) return;
  state.sightings = state.sightings.filter(s => !state.selected.has(s.id));
  state.selected = new Set();
  state.selectMode = false;
  showToast(`${count} sighting${count > 1 ? 's' : ''} deleted`);
  saveSightings(state.sightings);
  render();
}

// ==================== INIT ====================
(async function init() {
  const customs = await loadCustomAnimals();
  if (customs.length > 0) {
    state.customAnimals = customs;
    customs.forEach(a => { if (!ANIMALS.find(x => x.id === a.id)) ANIMALS.push(a); });
  }
  const saved = await loadSightings();
  if (saved && saved.length > 0) { state.sightings = saved; }
  render();
})();
</script>
</body>
